services:
  twitxgram:
    build: .
    image: twitxgram
    restart: unless-stopped          # survive crashes / host reboots
    ports:
      - "3030:3030"
    env_file:
      - .env                          # TWITTER_BEARER_TOKEN, METRICOOL_*, API_KEY, PUBLIC_BASE_URL, …
    volumes:
      - twitxgram-data:/app/data      # watch config, digest queue (persisted)
      - twitxgram-bg:/app/backgrounds # uploaded custom backgrounds (persisted)
      # /app/output is intentionally ephemeral (swept on a TTL)
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3030/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  twitxgram-data:
  twitxgram-bg:
